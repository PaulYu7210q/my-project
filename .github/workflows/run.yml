name: Run Service

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: run-group
  cancel-in-progress: false

env:
  CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
  GROK_REPO: PaulYu7210q/grokcli-2api
  BACKUP_REPO: jjjjllll111/db-storage
  ADMIN_PASSWORD: ${{ secrets.GROK2API_ADMIN_PASSWORD }}
  RUN_DURATION: 19800

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout grokcli-2api source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GROK_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: grokcli-2api

      - name: Checkout backup repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKUP_REPO }}
          token: ${{ secrets.DB_STORAGE_TOKEN }}
          path: db-repo
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: grokcli-2api/go.mod
          cache-dependency-path: grokcli-2api/go.sum

      - name: Restore PostgreSQL backup
        run: |
          set -Eeuo pipefail
          if [ -f db-repo/grok2api.dump ]; then
            pg_restore --list db-repo/grok2api.dump >/dev/null
            echo "pg_archive_restored=1" >> "$GITHUB_ENV"
            echo "[*] PostgreSQL archive validated"
          else
            echo "pg_archive_restored=0" >> "$GITHUB_ENV"
            echo "[*] no PostgreSQL archive; fresh Go schema will be created"
          fi

      - name: Install Redis and PostgreSQL
        run: |
          set -Eeuo pipefail
          sudo apt update -qq
          sudo apt install -y -qq redis-server postgresql postgresql-contrib
          sudo systemctl start redis-server
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER grok2api WITH PASSWORD 'grok2api' SUPERUSER;" 2>/dev/null || true
          sudo -u postgres psql -c "CREATE DATABASE grok2api OWNER grok2api;" 2>/dev/null || true
          redis-cli ping
          sudo -u postgres psql -d grok2api -c "SELECT 1;"
          if [ "${pg_archive_restored:-0}" = "1" ]; then
            PGPASSWORD=grok2api pg_restore \
              --exit-on-error --single-transaction --no-owner --no-privileges \
              --dbname="postgresql://grok2api@127.0.0.1:5432/grok2api" \
              db-repo/grok2api.dump
            echo "[*] PostgreSQL restored from grok2api.dump"
          fi

      - name: Install and start Cloudflare WARP SOCKS5 proxy
        run: |
          set -Eeuo pipefail
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
          sudo apt update -qq
          sudo apt install -y -qq cloudflare-warp
          sudo systemctl start warp-svc
          sleep 3
          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          for _ in $(seq 1 30); do
            ss -ltn | grep -q ':40000' && break
            sleep 1
          done
          ss -ltn | grep ':40000' || { echo "[!] WARP SOCKS5 port 40000 not listening"; warp-cli --accept-tos status || true; exit 1; }
          code=$(curl --silent --show-error --max-time 20 --output /dev/null --write-out "%{http_code}" \
            --socks5-hostname 127.0.0.1:40000 https://accounts.x.ai/)
          [ "$code" != "000" ] || { echo "[!] WARP SOCKS5 transport failed"; exit 1; }
          echo "[*] WARP SOCKS5 ready: 127.0.0.1:40000 (x.ai HTTP $code)"

      - name: Install Python sidecar runtime
        working-directory: grokcli-2api
        run: |
          set -Eeuo pipefail
          sudo apt install -y -qq xvfb python3 python3-pip \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libgtk-3-0 libasound2t64 libxss1 libxrandr2 libxkbcommon0 \
            libpango-1.0-0 libxshmfence1 libxcomposite1 libxdamage1 libxfixes3 \
            libxext6 fonts-liberation fonts-noto-color-emoji
          python3 -m pip install --no-cache-dir -U pip
          python3 -m pip install --no-cache-dir -r requirements.txt
          python3 -m pip install --no-cache-dir -r requirements-store.txt
          python3 -m pip install --no-cache-dir -r turnstile-solver/requirements.txt
          python3 -m camoufox fetch

      - name: Build, migrate, and start Go runtime
        working-directory: grokcli-2api
        run: |
          set -Eeuo pipefail
          [ -n "$ADMIN_PASSWORD" ] || { echo "[!] GROK2API_ADMIN_PASSWORD secret not set"; exit 1; }
          export PYTHONPATH="$PWD:$PWD/grok-build-auth${PYTHONPATH:+:$PYTHONPATH}"
          export DISPLAY=:99
          export GROK2API_RUNTIME=go
          export GROK2API_STORE_BACKEND=hybrid
          export GROK2API_REQUIRE_SHARED_STORES=1
          export GROK2API_REQUIRE_MIGRATIONS=1
          export GROK2API_WORKERS=2
          export REDIS_URL=redis://127.0.0.1:6379/0 GROK2API_REDIS_URL=redis://127.0.0.1:6379/0
          export DATABASE_URL=postgresql://grok2api:grok2api@127.0.0.1:5432/grok2api
          export GROK2API_DATABASE_URL=postgresql://grok2api:grok2api@127.0.0.1:5432/grok2api
          export GROK2API_HOST=127.0.0.1 GROK2API_PORT=3000 GROK2API_OPEN_BROWSER=0
          export GROK2API_GO_PUBLIC_READ=1 GROK2API_GO_CHAT=1 GROK2API_GO_MESSAGES=1 GROK2API_GO_RESPONSES=1
          export GROK2API_GO_ADMIN_READ=1 GROK2API_GO_ADMIN_WRITE=1 GROK2API_GO_MAINTAINER=1 GROK2API_GO_WRITES=1
          export GROK2API_GO_OWNERSHIP_MODE=all
          export GROK2API_CAPTCHA_PROVIDER=local GROK2API_INLINE_SOLVER=0
          export GROK2API_LOCAL_SOLVER_URL=http://127.0.0.1:5072 LOCAL_SOLVER_URL=http://127.0.0.1:5072
          export GROK2API_REGISTRATION_SIDECAR=1 GROK2API_REGISTRATION_HOST=127.0.0.1 GROK2API_REGISTRATION_PORT=18070
          export GROK2API_REGISTRATION_SERVICE_URL=http://127.0.0.1:18070
          export GROK2API_XAI_PROXY=socks5://127.0.0.1:40000 GROK2API_PROXY=socks5://127.0.0.1:40000
          export GROK2API_ADMIN_PASSWORD="$ADMIN_PASSWORD"
          mkdir -p bin turnstile-solver/logs turnstile-solver/keys
          go build -o bin/grok2api ./cmd/grok2api
          go build -o bin/grok2api-migrate ./cmd/grok2api-migrate
          ./bin/grok2api-migrate -dir migrations up
          Xvfb :99 -screen 0 1280x720x24 > xvfb.log 2>&1 &
          printf 'socks5://127.0.0.1:40000\n' > turnstile-solver/proxies.txt
          (
            cd turnstile-solver
            nohup python3 api_solver.py --browser_type camoufox --thread 3 --host 127.0.0.1 --port 5072 --proxy --debug \
              > logs/turnstile_solver.log 2>&1 &
            echo $! > logs/turnstile_solver.pid
          )
          nohup python3 scripts/registration_service.py > turnstile-solver/logs/registration_sidecar.log 2>&1 &
          echo $! > turnstile-solver/logs/registration_sidecar.pid
          nohup ./bin/grok2api > app.log 2>&1 &
          echo $! > /tmp/app.pid
          for _ in $(seq 1 90); do
            if curl -fsS -m 2 http://127.0.0.1:3000/ready >/dev/null; then
              echo "[*] Go runtime ready"
              break
            fi
            if ! kill -0 "$(cat /tmp/app.pid)" 2>/dev/null; then
              echo "[!] Go runtime exited"
              tail -100 app.log || true
              exit 1
            fi
            sleep 2
          done
          curl -fsS -m 2 http://127.0.0.1:3000/ready >/dev/null || { echo "[!] Go runtime never became ready"; tail -100 app.log || true; exit 1; }
          curl -fsS -m 2 http://127.0.0.1:5072/health >/dev/null || { echo "[!] solver not ready"; exit 1; }
          curl -fsS -m 2 http://127.0.0.1:18070/health >/dev/null || { echo "[!] registration sidecar not ready"; exit 1; }
          payload=$(python3 -c 'import json,sys; print(json.dumps({"password": sys.argv[1]}))' "$ADMIN_PASSWORD")
          status=$(curl -sS -o /tmp/admin-setup.json -w "%{http_code}" -X POST http://127.0.0.1:3000/admin/api/setup \
            -H "Content-Type: application/json" --data "$payload")
          case "$status" in
            200) echo "[*] admin password initialized" ;;
            400) echo "[*] admin password already configured" ;;
            *) echo "[!] admin setup failed (HTTP $status)"; cat /tmp/admin-setup.json; exit 1 ;;
          esac
          # Seed DeployTools as default mail provider (no API key required).
          token=$(curl -sS -X POST http://127.0.0.1:3000/admin/api/login \
            -H "Content-Type: application/json" --data "$payload" \
            | python3 -c "import sys,json
try: print(json.load(sys.stdin).get('token',''))
except Exception: print('')")
          [ -n "$token" ] || { echo "[!] admin login failed — cannot seed DeployTools"; exit 1; }
          seed='{"mail_provider":"deploytools","deploytools_base_url":"https://deploytools.site","deploytools_api_key":"","deploytools_domain":"","captcha_provider":"local","local_solver_url":"http://127.0.0.1:5072","proxy":"socks5://127.0.0.1:40000","proxy_strategy":"round_robin","count":1,"concurrency":3}'
          curl -sS -X PUT http://127.0.0.1:3000/admin/api/accounts/register-email/config \
            -H "X-Admin-Token: $token" -H "Content-Type: application/json" \
            --data "$seed" | head -c 400; echo
          echo "[*] DeployTools registration config seeded"
          echo "[*] accounts=$(PGPASSWORD=grok2api psql -At -h 127.0.0.1 -U grok2api -d grok2api -c 'SELECT count(*) FROM accounts')"

      - name: Start Cloudflare Tunnel
        run: |
          set -Eeuo pipefail
          [ -n "$CF_TUNNEL_TOKEN" ] || { echo "[!] CF_TUNNEL_TOKEN secret not set"; exit 1; }
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          nohup cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN" > tunnel.log 2>&1 &
          echo $! > /tmp/cloudflared.pid
          for _ in $(seq 1 30); do
            if kill -0 "$(cat /tmp/cloudflared.pid)" 2>/dev/null && curl -fsS -m 3 https://xai.logincore.me/ready >/dev/null; then
              echo "[*] Cloudflare tunnel ready"
              exit 0
            fi
            sleep 2
          done
          echo "[!] Cloudflare tunnel not ready"
          tail -80 tunnel.log || true
          exit 1

      - name: Keep alive and back up PostgreSQL
        run: |
          set -Eeuo pipefail
          backup() {
            local message="$1"
            PGPASSWORD=grok2api pg_dump --format=custom --no-owner --no-privileges \
              --file=db-repo/grok2api.dump.tmp \
              "postgresql://grok2api@127.0.0.1:5432/grok2api" || return 1
            pg_restore --list db-repo/grok2api.dump.tmp >/dev/null || return 1
            mv db-repo/grok2api.dump.tmp db-repo/grok2api.dump
            (
              cd db-repo
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add grok2api.dump
              git commit -m "$message" --allow-empty
              git push origin HEAD:main
            )
          }
          end=$((SECONDS + RUN_DURATION))
          last=0
          while [ "$SECONDS" -lt "$end" ]; do
            app_pid=$(cat /tmp/app.pid 2>/dev/null || echo 0)
            tunnel_pid=$(cat /tmp/cloudflared.pid 2>/dev/null || echo 0)
            kill -0 "$app_pid" 2>/dev/null || { echo "[!] Go runtime exited"; exit 1; }
            curl -fsS -m 3 http://127.0.0.1:3000/ready >/dev/null || { echo "[!] Go runtime not ready"; exit 1; }
            if ! kill -0 "$tunnel_pid" 2>/dev/null; then
              echo "[!] cloudflared exited"
              exit 1
            fi
            now=$(date +%s)
            if [ $((now - last)) -ge 600 ]; then
              backup "checkpoint" || echo "[!] checkpoint failed; retry next interval"
              last=$now
            fi
            sleep 30
          done

      - name: Final diagnostics and PostgreSQL backup
        if: always()
        run: |
          set -u
          echo "=== Go app ==="
          tail -100 grokcli-2api/app.log 2>/dev/null || true
          echo "=== registration sidecar ==="
          tail -100 grokcli-2api/turnstile-solver/logs/registration_sidecar.log 2>/dev/null || true
          echo "=== solver ==="
          tail -100 grokcli-2api/turnstile-solver/logs/turnstile_solver.log 2>/dev/null || true
          echo "=== tunnel ==="
          tail -80 tunnel.log 2>/dev/null || true
          if PGPASSWORD=grok2api pg_dump --format=custom --no-owner --no-privileges \
            --file=db-repo/grok2api.dump.tmp \
            "postgresql://grok2api@127.0.0.1:5432/grok2api" \
            && pg_restore --list db-repo/grok2api.dump.tmp >/dev/null; then
            mv db-repo/grok2api.dump.tmp db-repo/grok2api.dump
            (
              cd db-repo
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add grok2api.dump
              git commit -m "final backup" --allow-empty
              git push origin HEAD:main
            ) || echo "[!] final backup push failed"
          else
            rm -f db-repo/grok2api.dump.tmp
            echo "[!] final backup skipped: PostgreSQL unavailable"
          fi
