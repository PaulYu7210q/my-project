name: Run Service

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-group
  # Queue a new run instead of killing the active run before final backup.
  cancel-in-progress: false

env:
  PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
  CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
  GROK_REPO: ${{ github.repository_owner }}/grokcli-2api
  ADMIN_PASSWORD: ${{ secrets.GROK2API_ADMIN_PASSWORD }}
  RUN_DURATION: 19800

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout grokcli-2api source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GROK_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: grokcli-2api

      - name: Checkout backup repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/db-storage
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: db-repo
          fetch-depth: 1
          persist-credentials: true

      - name: Restore backup repository
        run: |
          set -Eeuo pipefail
          if [ -f db-repo/data.zip ]; then
            unzip -tqq db-repo/data.zip
            (cd grokcli-2api && unzip -o -q ../db-repo/data.zip -d .)
            echo "[*] filesystem data restored"
          else
            echo "[*] no data.zip; fresh filesystem state"
          fi
          if [ -f db-repo/grok2api.dump ]; then
            pg_restore --list db-repo/grok2api.dump >/dev/null
            echo "pg_archive_restored=1" >> "$GITHUB_ENV"
            echo "[*] PostgreSQL archive validated"
          else
            echo "pg_archive_restored=0" >> "$GITHUB_ENV"
            echo "[*] no PostgreSQL archive; JSON bootstrap eligible"
          fi

      - name: Install Redis + PostgreSQL (native, hybrid mode)
        run: |
          sudo apt update -qq
          sudo apt install -y -qq redis-server postgresql postgresql-contrib
          sudo systemctl start redis-server
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER grok2api WITH PASSWORD 'grok2api' SUPERUSER;" 2>/dev/null || true
          sudo -u postgres psql -c "CREATE DATABASE grok2api OWNER grok2api;" 2>/dev/null || true
          redis-cli ping
          sudo -u postgres psql -d grok2api -c "SELECT 1;"
          if [ "${pg_archive_restored:-0}" = "1" ]; then
            PGPASSWORD=grok2api pg_restore \
              --exit-on-error --single-transaction --no-owner --no-privileges \
              --dbname="postgresql://grok2api@127.0.0.1:5432/grok2api" \
              db-repo/grok2api.dump
            echo "[*] PostgreSQL restored from grok2api.dump"
          fi

      - name: Install + start Cloudflare WARP SOCKS5 proxy
        run: |
          set -e
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
          sudo apt update -qq
          sudo apt install -y -qq cloudflare-warp
          sudo systemctl start warp-svc
          sleep 3
          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          for i in $(seq 1 30); do
            if ss -ltn 2>/dev/null | grep -q ':40000'; then
              break
            fi
            sleep 1
          done
          ss -ltn | grep ':40000' || { echo "[!] WARP SOCKS5 port 40000 not listening"; warp-cli --accept-tos status || true; exit 1; }
          # x.ai commonly returns 403 to a bare curl probe; that proves the SOCKS
          # connection reached x.ai. Fail only on transport/TLS errors, not HTTP status.
          CODE=$(curl --silent --show-error --max-time 20 --output /dev/null --write-out "%{http_code}" \
            --socks5-hostname 127.0.0.1:40000 https://accounts.x.ai/)
          [ "$CODE" != "000" ] || { echo "[!] WARP SOCKS5 transport failed"; exit 1; }
          echo "[*] WARP SOCKS5 ready: 127.0.0.1:40000 (x.ai HTTP $CODE)"

      - name: Install Python + solver runtime (NO GUI / noVNC / Chrome)
        working-directory: grokcli-2api
        run: |
          # Xvfb = virtual framebuffer for the solver's headless browser, NOT a desktop.
          sudo apt install -y -qq xvfb python3 python3-pip \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libgtk-3-0 libasound2t64 libxss1 libxrandr2 libxkbcommon0 \
            libpango-1.0-0 libxshmfence1 libxcomposite1 libxdamage1 libxfixes3 \
            libxext6 fonts-liberation fonts-noto-color-emoji
          python3 -m pip install --no-cache-dir -U pip
          python3 -m pip install --no-cache-dir -r requirements.txt
          python3 -m pip install --no-cache-dir -r requirements-store.txt
          python3 -m pip install --no-cache-dir -r turnstile-solver/requirements.txt
          python3 -m camoufox fetch

      - name: "Start inline solver + app (hybrid mode: Redis + PostgreSQL)"
        working-directory: grokcli-2api
        run: |
          export PYTHONPATH="$PWD/grok-build-auth:$PYTHONPATH"
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          mkdir -p turnstile-solver/logs turnstile-solver/keys
          # Solver browser must share the registration WARP IP. api_solver --proxy
          # reads proxies.txt from its current working directory.
          printf 'socks5://127.0.0.1:40000\n' > proxies.txt
          export TURNSTILE_LAZY=1 TURNSTILE_IDLE_SEC=180
          nohup python3 turnstile-solver/api_solver.py --browser_type camoufox \
            --thread 3 --host 127.0.0.1 --port 5072 --proxy --debug \
            > turnstile-solver/logs/solver.log 2>&1 &
          # Hybrid: Redis + PostgreSQL on loopback (created above).
          export GROK2API_STORE_BACKEND=hybrid
          export GROK2API_WORKERS=2
          export REDIS_URL=redis://127.0.0.1:6379/0 GROK2API_REDIS_URL=redis://127.0.0.1:6379/0
          export DATABASE_URL=postgresql://grok2api:grok2api@127.0.0.1:5432/grok2api
          export GROK2API_DATABASE_URL=postgresql://grok2api:grok2api@127.0.0.1:5432/grok2api
          export GROK2API_HOST=127.0.0.1 GROK2API_PORT=3000 GROK2API_OPEN_BROWSER=0
          export GROK2API_CAPTCHA_PROVIDER=local GROK2API_LOCAL_SOLVER_URL=http://127.0.0.1:5072
          export GROK2API_INLINE_SOLVER=0
          # Default the mail provider to DeployTools at process start, so the app
          # reads deploytools from settings_store._env_registration_defaults even
          # if the /login -> PUT /config seed step never runs (e.g. stale admin
          # hash). Without this, mail_provider falls back to moemail with no key
          # -> "Mail API key missing" and 50/50 registration fails.
          export GROK2API_MAIL_PROVIDER=deploytools MAIL_PROVIDER=deploytools
          export GROK2API_DEPLOYTOOLS_BASE_URL=https://deploytools.site DEPLOYTOOLS_BASE_URL=https://deploytools.site
          # App reads GROK2API_ADMIN_PASSWORD; export it so the app self-seeds the
          # admin hash when none exists (belt-and-suspenders with the strip below).
          [ -n "$ADMIN_PASSWORD" ] || { echo "[!] GROK2API_ADMIN_PASSWORD secret not set"; exit 1; }
          export GROK2API_ADMIN_PASSWORD="$ADMIN_PASSWORD"
          # PostgreSQL archive is authoritative in hybrid mode. Only bootstrap
          # from legacy JSON when no archive exists; migration can replace keys
          # and settings from stale JSON after a restore.
          if [ "${pg_archive_restored:-0}" != "1" ]; then
            # Fresh legacy bootstrap: remove stale admin hash so env seeds it.
            if [ -f data/settings.json ]; then
              python3 -c "import json;p='data/settings.json';d=json.load(open(p));d.pop('admin_password_hash',None);d.pop('admin_password_salt',None);open(p,'w').write(json.dumps(d,ensure_ascii=False,indent=2))"
            fi
            python3 migrate_json_to_pg.py --data-dir ./data
          else
            echo "[*] PostgreSQL archive restored; skip JSON migration/config mutation"
          fi
          nohup python3 app.py > app.log 2>&1 &
          echo $! > /tmp/app.pid
          for i in $(seq 1 90); do
            c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/health 2>/dev/null || echo 000)
            if [ "$c" = "200" ] || [ "$c" = "503" ]; then echo "[*] app up ($c)"; break; fi
            sleep 2
          done
          # Bootstrap admin password so the web UI is usable on first run (no-op if restored).
          PW="$ADMIN_PASSWORD"
          PAYLOAD=$(python3 -c 'import json,sys; print(json.dumps({"password": sys.argv[1]}))' "$PW")
          curl -s -X POST http://127.0.0.1:3000/admin/api/setup -H "Content-Type: application/json" \
            --data "$PAYLOAD" >/dev/null 2>&1 || true

      - name: Seed registration config (deploytools) from winrunner-config.json
        # Existing PostgreSQL archive owns its config; seed only first bootstrap.
        if: env.pg_archive_restored != '1'
        working-directory: grokcli-2api
        run: |
          set -e
          BASE=http://127.0.0.1:3000/admin/api
          PW="$ADMIN_PASSWORD"
          PAYLOAD=$(python3 -c 'import json,sys; print(json.dumps({"password": sys.argv[1]}))' "$PW")
          # Login (setup above is a no-op when already set up; login works either way).
          TOKEN=$(curl -s -X POST "$BASE/login" -H "Content-Type: application/json" \
            --data "$PAYLOAD" | python3 -c "import sys,json
          try: print(json.load(sys.stdin).get('token',''))
          except Exception: print('')")
          if [ -z "$TOKEN" ]; then echo "[!] admin login failed — cannot seed config"; exit 1; fi
          # Restore the seed config (mail_provider/captcha/proxy/count) so a fresh DB
          # doesn't fall back to moemail-with-no-key ("Mail API key missing").
          if [ -f winrunner-config.json ]; then
            curl -s -X PUT "$BASE/accounts/register-email/config" \
              -H "X-Admin-Token: $TOKEN" -H "Content-Type: application/json" \
              --data-binary @winrunner-config.json | head -c 400; echo
            echo "[*] registration config seeded (deploytools)"
          else
            echo "[!] winrunner-config.json missing — not seeding"
          fi

      - name: Start Cloudflare Tunnel
        run: |
          if [ -z "$CF_TUNNEL_TOKEN" ]; then
            echo "[!] CF_TUNNEL_TOKEN secret not set"; exit 1
          fi
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          nohup cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN" > tunnel.log 2>&1 &
          echo $! > /tmp/cloudflared.pid
          sleep 6
          tail -15 tunnel.log || true

      - name: Keep alive + watchdog + backup
        run: |
          set -Eeuo pipefail
          # Hybrid durable state is PostgreSQL. Publish validated dump + data.zip
          # together. A failed checkpoint retries next cycle. GitHub hard-kill
          # cannot guarantee final cleanup; 10-minute checkpoints bound loss.
          backup() {
            local msg="${1:-backup}"
            PGPASSWORD=grok2api pg_dump --format=custom --no-owner --no-privileges \
              --file=db-repo/grok2api.dump.tmp \
              "postgresql://grok2api@127.0.0.1:5432/grok2api" || return 1
            pg_restore --list db-repo/grok2api.dump.tmp >/dev/null || return 1
            mv db-repo/grok2api.dump.tmp db-repo/grok2api.dump || return 1
            (cd grokcli-2api && rm -f ../db-repo/data.zip.tmp && \
              zip -r -q ../db-repo/data.zip.tmp data -x "data/logs/*" "data/bin/*") || return 1
            unzip -tqq db-repo/data.zip.tmp || return 1
            mv db-repo/data.zip.tmp db-repo/data.zip || return 1
            (set -e; cd db-repo
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add data.zip grok2api.dump
              git commit -m "$msg" --allow-empty
              git push origin HEAD:main) || { echo "[!] publish failed; retry next checkpoint"; return 0; }
            echo "[*] published $msg"
          }
          END=$((SECONDS + RUN_DURATION)); LAST=0
          while [ $SECONDS -lt $END ]; do
            CF=$(cat /tmp/cloudflared.pid 2>/dev/null || echo 0)
            if [ "$CF" -gt 0 ] && ! kill -0 $CF 2>/dev/null; then
              echo "[$(date)] cloudflared died, restarting"
              nohup cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN" > tunnel.log 2>&1 &
              echo $! > /tmp/cloudflared.pid; sleep 3
            fi
            if ! curl -s http://127.0.0.1:3000/health >/dev/null 2>&1; then
              echo "[$(date)] app unresponsive — see grokcli-2api/app.log"
            fi
            NOW=$(date +%s); if [ $((NOW-LAST)) -ge 600 ]; then backup "backup" || echo "[!] checkpoint failed; retry next cycle"; LAST=$NOW; fi
            sleep 30
          done

      - name: Final diagnostics + backup
        if: always()
        run: |
          set -Eeuo pipefail
          echo "=== app.log (tail) ==="
          tail -80 grokcli-2api/app.log 2>/dev/null || true
          echo "=== solver.log (tail) ==="
          tail -80 grokcli-2api/turnstile-solver/logs/solver.log 2>/dev/null || true
          echo "=== tunnel.log (tail) ==="
          tail -40 tunnel.log 2>/dev/null || true
          PGPASSWORD=grok2api pg_dump --format=custom --no-owner --no-privileges \
            --file=db-repo/grok2api.dump.tmp \
            "postgresql://grok2api@127.0.0.1:5432/grok2api" || {
              echo "[!] pg_dump failed; skip final publish"
              exit 1
            }
          pg_restore --list db-repo/grok2api.dump.tmp >/dev/null
          mv db-repo/grok2api.dump.tmp db-repo/grok2api.dump
          if (cd grokcli-2api && rm -f ../db-repo/data.zip.tmp && \
            zip -r -q ../db-repo/data.zip.tmp data -x "data/logs/*" "data/bin/*") && \
            unzip -tqq db-repo/data.zip.tmp; then
            mv db-repo/data.zip.tmp db-repo/data.zip
          else
            rm -f db-repo/data.zip.tmp
            echo "[!] final data.zip failed; publishing PostgreSQL dump only"
          fi
          (cd db-repo
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.zip grok2api.dump
            git commit -m "final backup" --allow-empty
            git push origin HEAD:main)
          echo "[*] final backup published"
